<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Perpus SMPN 1 Damai</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #0ea5e9; --danger: #ef4444; --text-main: #1e293b; }
        body { margin: 0; font-family: sans-serif; color: var(--text-main); background: #f4f4f9; padding: 20px 10px; display: flex; justify-content: center; }
        .glass-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border-radius: 20px; border: none; background: #e2e8f0; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        label { display: block; font-weight: bold; margin: 15px 0 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-family: inherit;}
        textarea { height: 100px; resize: vertical; }
        .btn-main { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="login-screen" class="glass-card" style="max-width: 350px; text-align: center; margin-top: 10vh;">
        <h2>Login Admin Perpus</h2>
        <input type="text" id="username" placeholder="Username" style="margin-bottom: 10px;">
        <input type="password" id="password" placeholder="Password">
        <button onclick="doLogin()" class="btn-main">Login</button>
    </div>

    <div id="dashboard-screen" class="glass-card" style="display: none;">
        <div class="header">
            <h2>Portal Admin Perpus</h2>
            <button onclick="logout()" style="background:var(--danger);color:white;border:none;padding:8px 15px;border-radius:10px;cursor:pointer;">Logout</button>
        </div>
        
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-tulis" onclick="switchTab('tulis')">✏️ Tulis Berita</button>
            <button class="tab-btn" id="tab-pengaturan" onclick="switchTab('pengaturan')">⚙️ Info & Aturan</button>
            <button class="tab-btn" id="tab-katalog" onclick="switchTab('katalog')">📚 Link Katalog</button>
            <button class="tab-btn" id="tab-galeri" onclick="switchTab('galeri')">📸 Galeri</button>
        </div>

        <div id="area-tulis">
            <label>Tanggal</label><input type="date" id="date">
            <label>Judul Berita</label><input type="text" id="title" placeholder="Masukkan judul info/berita...">
            <label>Foto Cover</label><input type="file" id="image" accept="image/*">
            <label>Isi Berita</label><textarea id="body" style="height: 200px;"></textarea>
            
            <button onclick="alert('Fitur Publish jalan! Sambungin ke /api/publish lu.')" class="btn-main">Terbitkan Berita</button>
        </div>

        <div id="area-pengaturan" style="display: none;">
            <label>Teks Profil Perpustakaan</label>
            <textarea id="set-profil"></textarea>
            <label>Jam Operasional</label>
            <input type="text" id="set-jam" placeholder="07.30 - 14.00 WITA">
            <button onclick="alert('Disimpan!')" class="btn-main">Simpan Info</button>
        </div>

        <div id="area-katalog" style="display: none;">
            <label>Link E-Book SIBI</label>
            <input type="text" id="set-sibi" placeholder="https://linktr.ee/BacaKuy">
            <label>Link Google Drive Perpus</label>
            <input type="text" id="set-drive" placeholder="https://bit.ly/KumpulanEbookSMPN1Damai">
            <button onclick="alert('Link Tersimpan!')" class="btn-main">Simpan Link Katalog</button>
        </div>

        <div id="area-galeri" style="display: none;">
            <label>Upload Foto Galeri</label>
            <input type="file" accept="image/*" multiple>
            <button onclick="alert('Upload jalan!')" class="btn-main">Upload ke Galeri</button>
        </div>
    </div>

    <script>
        window.onload = () => { 
            if (sessionStorage.getItem('cms_user')) { 
                document.getElementById('login-screen').style.display = 'none'; 
                document.getElementById('dashboard-screen').style.display = 'block'; 
                document.getElementById('date').value = new Date().toLocaleDateString('en-CA');
            } 
        };
        
        function switchTab(t) { 
            ['tulis', 'pengaturan', 'katalog', 'galeri'].forEach(x => { 
                document.getElementById('area-'+x).style.display = 'none'; 
                document.getElementById('tab-'+x).classList.remove('active'); 
            }); 
            document.getElementById('area-'+t).style.display = 'block'; 
            document.getElementById('tab-'+t).classList.add('active'); 
        }
        
        function doLogin() { 
            const u=document.getElementById('username').value, p=document.getElementById('password').value; 
            if(u && p) { sessionStorage.setItem('cms_user', u); sessionStorage.setItem('cms_pass', p); location.reload(); }
        }
        
        function logout() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
